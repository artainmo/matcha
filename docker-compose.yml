services:
  postgres:
    image: postgres:16
    container_name: matcha-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 10

  ruby:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matcha-ruby
    restart: unless-stopped
    ports:
      - "1942:1942"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app

volumes:
  postgres-data:
