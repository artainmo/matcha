<mat-form-field appearance="fill">
    <mat-label>Enter your new password</mat-label>
    <input [formControl]="formControl" [type]="hide ? 'password' : 'text'" autocomplete="on" matInput name="password">
    <p>Password must contain at least:
        <br>- 6 characters
        <br>- One uppercase letter
        <br>- One lowercase letter
        <br>- One number
        <br>- One special character
    </p>
    <button (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide" mat-icon-button
            matSuffix>
        <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
</mat-form-field>
<br>
<button (click)="request()" [disabled]="formControl.invalid" color="primary" mat-button>Reset password</button>
