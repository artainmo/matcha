<form [formGroup]="form" [hidden]="loading || success">
    <mat-form-field appearance="fill">
        <mat-label>Gender</mat-label>
        <mat-select formControlName="gender">
            <mat-option value="FEMALE">Female</mat-option>
            <mat-option value="MALE">Male</mat-option>
            <mat-option value="OTHER">Other</mat-option>
        </mat-select>
    </mat-form-field>
    <br>
    <mat-form-field appearance="fill">
        <mat-label>Birthday</mat-label>
        <input [matDatepicker]="picker" formControlName="birthday" matInput>
        <mat-hint>DD/MM/YYYY</mat-hint>
        <mat-datepicker-toggle [for]="picker" matSuffix></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <br>
    <mat-form-field appearance="fill">
        <mat-label>Sexual preferences</mat-label>
        <mat-select formControlName="preferences">
            <mat-option value="FEMALE">Female</mat-option>
            <mat-option value="MALE">Male</mat-option>
            <mat-option value="BI">Bi</mat-option>
            <mat-option value="OTHER">Other</mat-option>
        </mat-select>
    </mat-form-field>
    <br>
    <mat-form-field appearance="fill">
        <mat-label>Biography</mat-label>
        <input autocomplete="on" formControlName="biography" matInput name="biography" type="text">
    </mat-form-field>
    <br>
    <!--		INTERESTS TAGS -->
    <app-tags [tags]="_tags"></app-tags>
    <!--		pictures -->
    <app-picture-selection
            (favorite)="favorite = $event"></app-picture-selection>
    <br>
    <button (click)="submit()" [disabled]="form.invalid || _tags.length < 1 || favorite == ''" mat-raised-button>
        Register !
    </button>
</form>
@if (loading) {
    <div>
        <h3>Register in progress</h3>
    </div>
}
@if (success) {
    <div>
        <h3>An email has been sent to verify your account.
            <br>You will not be able to login without verifying your account.
        </h3>
    </div>
}
{{ error }}
