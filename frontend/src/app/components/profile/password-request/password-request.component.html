<mat-form-field appearance="fill">
    <mat-label>Enter your user</mat-label>
    <input [(ngModel)]="username" autocomplete="on" matInput name="username">
    @if (unknownUsername$ | async) {
        <mat-error>{{ message$ | async }}</mat-error>
    }
</mat-form-field>
<br>
<button (click)="request()" [disabled]="!username" color="primary" mat-button>Request password</button>
<p>{{ message$ | async }}</p>
